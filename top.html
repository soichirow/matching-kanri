<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マッチング管理 — カードゲームイベントのマッチングを簡単に</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c6ff7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect width='18' height='18' x='3' y='3' rx='2'/><path d='m16 8-4 4-4-4'/><path d='m16 16-4-4-4 4'/></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #12131a; --surface: #1c1d27; --surface2: #252639;
  --border: #2e3049; --accent: #7c6ff7; --accent2: #4fc3f7;
  --success: #43e97b; --text: #e2e4f0; --text-dim: #8b8eaa;
  --radius: 10px;
}
[data-theme="light"] {
  --bg: #f0f1f5; --surface: #ffffff; --surface2: #e8e9f0;
  --border: #d0d1da; --accent: #6b5ce7; --accent2: #0288d1;
  --success: #2e8b57; --text: #1a1b2e; --text-dim: #5a5d75;
}
html { height: 100%; }
body {
  font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100%;
  display: flex; flex-direction: column;
}

/* ヒーロー */
.hero {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 24px 40px; text-align: center;
  min-height: 70vh;
}
.hero-title {
  font-size: 32px; font-weight: 800; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub { font-size: 16px; color: var(--text-dim); margin-bottom: 40px; line-height: 1.6; }
.hero-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
.btn-hero {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px 24px; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  text-decoration: none; transition: transform 0.1s, opacity 0.15s;
}
.btn-hero:hover { opacity: 0.9; }
.btn-hero:active { transform: scale(0.97); }
.btn-create { background: var(--accent); color: white; }
.btn-join { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

/* コード入力 */
.code-section {
  display: none; flex-direction: column; align-items: center; gap: 12px;
  width: 100%; max-width: 320px;
}
.code-section.show { display: flex; }
.code-input {
  font-size: 32px; font-weight: 800; letter-spacing: 0.2em;
  text-align: center; width: 200px; padding: 12px;
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 12px; color: var(--accent); text-transform: uppercase;
  outline: none;
}
.code-input:focus { border-color: var(--accent); }
.code-input::placeholder { font-size: 16px; letter-spacing: 0.05em; font-weight: 400; }
.btn-code-submit {
  padding: 12px 32px; font-size: 15px; font-weight: 700;
  background: var(--accent2); color: white; border: none;
  border-radius: 10px; cursor: pointer;
}
.btn-code-back {
  background: none; border: none; color: var(--text-dim);
  font-size: 13px; cursor: pointer; padding: 8px;
}
.btn-code-back:hover { color: var(--text); }
.code-error { color: #ef5350; font-size: 13px; display: none; }

/* 特徴セクション */
.features {
  padding: 40px 24px; max-width: 640px; margin: 0 auto; width: 100%;
}
.features-title {
  font-size: 18px; font-weight: 700; color: var(--text-dim);
  text-align: center; margin-bottom: 24px;
}
.feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .feature-grid { grid-template-columns: 1fr; } }
.feature-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.feature-card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.feature-card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* フッター */
.footer {
  padding: 20px 24px; text-align: center;
  font-size: 11px; color: var(--text-dim);
  border-top: 1px solid var(--border);
}
.footer a { color: var(--accent2); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-title">マッチング管理</h1>
  <p class="hero-sub">カードゲームイベントのマッチングを簡単に。<br>無料・登録不要。ブラウザだけで動作します。</p>

  <div class="hero-actions" id="hero-actions">
    <a href="index.html" class="btn-hero btn-create">イベントを作成</a>
    <button class="btn-hero btn-join" id="btn-join">コードで参加</button>
  </div>

  <div class="code-section" id="code-section">
    <input type="text" class="code-input" id="code-input" placeholder="A1B2" maxlength="6" autocomplete="off" inputmode="text">
    <button class="btn-code-submit" id="code-submit">参加する</button>
    <span class="code-error" id="code-error"></span>
    <button class="btn-code-back" id="code-back">戻る</button>
  </div>
</section>

<section class="features">
  <h2 class="features-title">特徴</h2>
  <div class="feature-grid">
    <div class="feature-card">
      <div class="feature-card-title">自動マッチング</div>
      <div class="feature-card-desc">過去の対戦を考慮し、偏りのない組み合わせを自動生成</div>
    </div>
    <div class="feature-card">
      <div class="feature-card-title">リアルタイム共有</div>
      <div class="feature-card-desc">参加コードで配席をスマホに即時配信。QRコードにも対応</div>
    </div>
    <div class="feature-card">
      <div class="feature-card-title">点数・順位表</div>
      <div class="feature-card-desc">VPの記録と累計順位表の自動生成。CSVエクスポート対応</div>
    </div>
    <div class="feature-card">
      <div class="feature-card-title">完全無料</div>
      <div class="feature-card-desc">サーバー不要・登録不要。ブラウザだけで使えます</div>
    </div>
  </div>
</section>

<footer class="footer">
  (c) そういちろう — <a href="https://x.com/black777cat" target="_blank" rel="noopener">@black777cat</a>
  ｜ <a href="https://github.com/soichirow/matching-kanri" target="_blank" rel="noopener">GitHub</a>
  ｜ <a href="https://www.amazon.jp/hz/wishlist/ls/1Z0X9ZM1D65A7?ref_=wl_share" target="_blank" rel="noopener">支援する</a>
</footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://ufmjvdytyldpqlhgxzfm.supabase.co',
  'sb_publishable_BR3vLJ4Vlfm1QmGqa-kY6Q_Q7jkXcS1'
)

const actions = document.getElementById('hero-actions')
const section = document.getElementById('code-section')
const input = document.getElementById('code-input')
const submit = document.getElementById('code-submit')
const error = document.getElementById('code-error')
const back = document.getElementById('code-back')

document.getElementById('btn-join').addEventListener('click', () => {
  actions.style.display = 'none'
  section.classList.add('show')
  input.focus()
})

back.addEventListener('click', () => {
  section.classList.remove('show')
  actions.style.display = 'flex'
  error.style.display = 'none'
  input.value = ''
})

const doSubmit = async () => {
  const code = input.value.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).toUpperCase().trim()
  if (!code) return
  submit.disabled = true
  submit.textContent = '検索中...'
  error.style.display = 'none'
  const { data } = await supabase.rpc('find_tournament_by_code', { p_code: code })
  if (data) {
    location.href = 'view.html?id=' + data
  } else {
    error.textContent = 'コードに一致するイベントが見つかりません'
    error.style.display = 'block'
    submit.disabled = false
    submit.textContent = '参加する'
  }
}

submit.addEventListener('click', doSubmit)
input.addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit() })

// テーマ: システム設定に従う
if (window.matchMedia('(prefers-color-scheme: light)').matches) {
  document.documentElement.setAttribute('data-theme', 'light')
}
</script>
</body>
</html>
