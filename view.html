<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント情報</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c6ff7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect width='18' height='18' x='3' y='3' rx='2'/><path d='m16 8-4 4-4-4'/><path d='m16 16-4-4-4 4'/></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #12131a;
  --surface:   #1c1d27;
  --surface2:  #252639;
  --border:    #2e3049;
  --accent:    #9389f9;
  --accent2:   #4fc3f7;
  --success:   #43e97b;
  --warning:   #f9a825;
  --danger:    #ef5350;
  --text:      #e2e4f0;
  --text-dim:  #9fa2bf;
  --radius:    10px;
  --shadow:    0 4px 12px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg:        #f0f1f5;
  --surface:   #ffffff;
  --surface2:  #e8e9f0;
  --border:    #d0d1da;
  --accent:    #5b4bd7;
  --accent2:   #0288d1;
  --success:   #2e8b57;
  --warning:   #e68a00;
  --danger:    #d32f2f;
  --text:      #1a1b2e;
  --text-dim:  #5a5d75;
  --shadow:    0 4px 12px rgba(0,0,0,0.1);
}

html, body { height: 100%; }
body {
  font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--bg); color: var(--text); font-size: 15px;
}

/* ── ヘッダー ──────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.header-top {
  display: flex; align-items: center; gap: 10px;
}
.header-title { font-size: 16px; font-weight: 800; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-status { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.header-status.live { color: var(--success); }
.header-status.live::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  background: var(--success); border-radius: 50%; margin-right: 4px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.btn-refresh {
  width: 44px; height: 44px; border: 1px solid var(--border); background: var(--surface2);
  border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 16px; flex-shrink: 0;
}
.btn-refresh:hover { background: var(--border); }
.btn-refresh.spinning svg { animation: spin 0.6s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 名前検索 ──────────────────────────── */
.search-bar {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
}
.search-input {
  flex: 1; font-size: 16px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); outline: none;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--text-dim); }
.search-clear {
  width: 44px; height: 44px; border: none; background: transparent;
  color: var(--text-dim); font-size: 18px; cursor: pointer; border-radius: 8px;
  display: none; align-items: center; justify-content: center;
}
.search-clear.show { display: flex; }
.search-clear:hover { background: var(--surface2); color: var(--text); }

/* ── 検索候補 ─────────────────────────── */
.search-suggestions {
  position: absolute; top: 100%; left: 0; right: 44px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto;
  z-index: 20; display: none;
}
.search-suggestions.show { display: block; }
.search-suggestion {
  padding: 10px 12px; font-size: 14px; cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.search-suggestion:last-child { border-bottom: none; }
.search-suggestion:hover, .search-suggestion.active { background: var(--surface2); }
.search-suggestion mark { background: transparent; color: var(--accent); font-weight: 700; }

/* ── タブ ──────────────────────────────── */
.tabs {
  display: flex; gap: 0; padding: 0 16px; margin-top: 8px;
  position: sticky; top: 0; z-index: 9;
  background: var(--bg);
}
.tab {
  flex: 1; padding: 12px 0; border: none; background: var(--surface2); min-height: 44px;
  color: var(--text-dim); font-size: 13px; font-weight: 600;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab:first-child { border-radius: 8px 0 0 0; }
.tab:last-child { border-radius: 0 8px 0 0; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface); }

/* ── コンテンツ ───────────────────────── */
.content { padding: 12px 16px 80px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── テーブルカード ───────────────────── */
.table-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px;
  box-shadow: var(--shadow); overflow: hidden;
}
.table-card.playing { border-color: var(--success); }
.table-card.empty { opacity: 0.5; }
.table-card .card-header {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}
.card-label { font-weight: 700; font-size: 15px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-size { font-size: 12px; color: var(--text-dim); }
.card-status {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px;
}
.card-status.playing { background: rgba(67,233,123,0.15); color: var(--success); }
.card-status.empty { background: var(--surface2); color: var(--text-dim); }

.card-players { padding: 8px 12px; }
.card-player {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; font-size: 14px;
}
.card-player.highlight {
  background: rgba(124,111,247,0.15); border-radius: 6px;
  padding: 4px 8px; margin: 2px -8px; font-weight: 700;
  color: var(--accent);
}
.card-player-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.group-badge {
  font-size: 10px; font-weight: 700; padding: 1px 5px;
  border-radius: 4px; background: var(--bg); color: var(--accent);
  min-width: 20px; text-align: center;
}
.bracket-badge {
  font-size: 10px; font-weight: 700; padding: 1px 5px;
  border-radius: 4px; background: rgba(249,168,37,.15); color: var(--warning);
  min-width: 20px; text-align: center;
}
.score-badge {
  font-size: 10px; font-weight: 700; padding: 1px 5px;
  border-radius: 4px; background: rgba(249,168,37,.15); color: var(--warning);
}
.empty-slot { color: var(--text-dim); font-size: 13px; opacity: 0.5; }

/* ── 順位表 ──────────────────────────── */
.standings-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.standings-table th {
  padding: 6px 8px; font-size: 11px; color: var(--text-dim);
  border-bottom: 2px solid var(--border); text-align: left;
}
.standings-table th:first-child { text-align: center; width: 32px; }
.standings-table th:last-child { text-align: right; }
.standings-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.standings-table td:first-child { text-align: center; color: var(--text-dim); }
.standings-table td:last-child { text-align: right; font-weight: 700; color: var(--warning); }
.standings-table tr.highlight td { background: rgba(124,111,247,0.1); }

/* ── 対戦履歴 ─────────────────────────── */
.history-player-select {
  width: 100%; font-size: 16px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); margin-bottom: 12px; outline: none;
}
.history-player-select:focus { border-color: var(--accent2); }
.history-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.history-name { flex: 1; font-size: 14px; }
.history-count { font-size: 12px; color: var(--text-dim); }
.history-section-title {
  font-size: 12px; font-weight: 700; color: var(--warning);
  margin: 12px 0 6px; padding-top: 8px; border-top: 1px solid var(--border);
}
.history-match {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; border-bottom: 1px solid var(--surface2); font-size: 13px;
}
.history-match-table { font-size: 11px; color: var(--text-dim); width: 60px; flex-shrink: 0; }
.history-match-players { flex: 1; }

/* ── ローディング/エラー ─────────────── */
.loading, .error-msg, .empty-msg {
  text-align: center; padding: 40px 20px;
  color: var(--text-dim); font-size: 14px;
}
.error-msg { color: var(--danger); }
.loading-spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}

/* ── 座席バナー ───────────────────────── */
.seat-banner {
  margin: 0 16px 8px; padding: 10px 14px;
  background: rgba(124,111,247,0.12); border: 1px solid var(--accent);
  border-radius: var(--radius); display: none;
}
.seat-banner.show { display: block; }
.seat-banner-label { font-size: 12px; color: var(--text-dim); }
.seat-banner-table { font-size: 18px; font-weight: 800; color: var(--accent); }
.seat-banner-status { font-size: 12px; color: var(--success); margin-left: 8px; }
.seat-banner-opponents { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* ── テーマ切替 ───────────────────────── */
.btn-theme {
  width: 44px; height: 44px; border: 1px solid var(--border); background: var(--surface2);
  border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 16px; flex-shrink: 0;
}
.btn-theme:hover { background: var(--border); }

/* ── トースト ─────────────────────────── */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 8px 18px;
  border-radius: 20px; box-shadow: var(--shadow);
  z-index: 4000; opacity: 0; transition: opacity .2s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-title" id="header-title">イベント情報</span>
    <span id="view-timer" style="display:none;font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--warning);"></span>
    <span class="header-status" id="header-status" aria-live="polite">接続中...</span>
    <button class="btn-theme" id="btn-theme" title="テーマ切替" aria-label="テーマ切替">
      <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
    <button class="btn-refresh" id="btn-refresh" title="更新" aria-label="更新">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
    </button>
  </div>
  <div class="search-bar" style="position:relative;">
    <input type="text" class="search-input" id="search-input" placeholder="名前で検索..." aria-label="名前で検索" autocomplete="off">
    <button class="search-clear" id="search-clear" aria-label="検索クリア">×</button>
    <div class="search-suggestions" id="search-suggestions" role="listbox"></div>
  </div>
</div>

<div class="tabs" role="tablist">
  <button class="tab active" data-tab="tables" role="tab" aria-selected="true" aria-controls="panel-tables">テーブル</button>
  <button class="tab" data-tab="standings" role="tab" aria-selected="false" aria-controls="panel-standings">順位表</button>
  <button class="tab" data-tab="history" role="tab" aria-selected="false" aria-controls="panel-history">対戦履歴</button>
</div>

<div class="seat-banner" id="seat-banner">
  <span class="seat-banner-label">あなたの座席</span>
  <span class="seat-banner-name" id="seat-banner-name" style="font-size:13px;font-weight:600;color:var(--text);margin-left:8px;"></span><br>
  <span class="seat-banner-table" id="seat-banner-table"></span>
  <span class="seat-banner-status" id="seat-banner-status"></span>
  <div class="seat-banner-opponents" id="seat-banner-opponents"></div>
  <button id="seat-checkin-btn" style="display:none;margin-top:8px;padding:10px 20px;min-height:44px;font-size:14px;font-weight:700;
    background:var(--success);color:#111;border:none;border-radius:8px;cursor:pointer;">来ました</button>
  <span id="seat-checkin-done" style="display:none;margin-top:6px;font-size:13px;color:var(--success);font-weight:600;">出席確認済み</span>
</div>

<div class="content">
  <div class="tab-panel active" id="panel-tables" role="tabpanel"></div>
  <div class="tab-panel" id="panel-standings" role="tabpanel"></div>
  <div class="tab-panel" id="panel-history" role="tabpanel"></div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

// ── Supabase設定 ───────────────────────────
const SUPABASE_URL = 'https://ufmjvdytyldpqlhgxzfm.supabase.co'
const SUPABASE_KEY = 'sb_publishable_BR3vLJ4Vlfm1QmGqa-kY6Q_Q7jkXcS1'
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// ── イベントID取得 ─────────────────────────────
const params = new URLSearchParams(location.search)
let tournamentId = params.get('id')
const codeParam = params.get('code')

// コードからID解決
const resolveCode = async (code) => {
  const normalized = code.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).toUpperCase().trim()
  const { data, error } = await supabase.rpc('find_tournament_by_code', { p_code: normalized })
  if (error || !data) return null
  return data
}

if (!tournamentId && codeParam) {
  // codeパラメータからID解決
  document.querySelector('.content').innerHTML = '<div class="loading"><div class="loading-spinner"></div>イベントを検索中...</div>'
  resolveCode(codeParam).then(id => {
    if (id) {
      location.replace(location.pathname + '?id=' + id)
    } else {
      document.querySelector('.content').innerHTML = '<div class="error-msg">コード「' + esc(codeParam) + '」に一致するイベントが見つかりません。</div>'
    }
  })
} else if (!tournamentId) {
  document.querySelector('.tabs').style.display = 'none'
  document.querySelector('.content').innerHTML = `
    <div style="text-align:center;padding:40px 20px;">
      <p style="color:var(--text-dim);font-size:14px;margin-bottom:16px;">参加コードを入力してください</p>
      <input type="text" id="code-input" placeholder="例: A1B2" maxlength="6"
        style="font-size:24px;font-weight:800;letter-spacing:0.15em;text-align:center;width:160px;max-width:80vw;padding:12px;
        background:var(--surface);border:2px solid var(--border);border-radius:12px;color:var(--accent);
        text-transform:uppercase;outline:none;" autocomplete="off" inputmode="text">
      <br>
      <button id="code-submit" style="margin-top:12px;padding:10px 24px;font-size:15px;font-weight:700;
        background:var(--accent);color:white;border:none;border-radius:10px;cursor:pointer;">参加する</button>
      <p id="code-error" style="color:var(--danger);font-size:13px;margin-top:12px;display:none;"></p>
    </div>`
  setTimeout(() => {
    const inp = document.getElementById('code-input')
    const btn = document.getElementById('code-submit')
    const err = document.getElementById('code-error')
    inp?.focus()
    inp?.addEventListener('keydown', e => { if (e.key === 'Enter') btn?.click() })
    btn?.addEventListener('click', async () => {
      const code = inp?.value?.trim()
      if (!code) return
      btn.disabled = true
      btn.textContent = '検索中...'
      err.style.display = 'none'
      const id = await resolveCode(code)
      if (id) {
        location.replace(location.pathname + '?id=' + id)
      } else {
        err.textContent = 'コードに一致するイベントが見つかりません'
        err.style.display = 'block'
        btn.disabled = false
        btn.textContent = '参加する'
      }
    })
  }, 50)
}

// ── 状態 ───────────────────────────────────
let tournamentData = null
let searchName = localStorage.getItem('view_search_name') || ''

const esc = str => String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

// ── トースト ──────────────────────────────
const toast = msg => {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  clearTimeout(el._t)
  el._t = setTimeout(() => el.classList.remove('show'), 2200)
}

// ── データ取得 ────────────────────────────
const fetchData = async () => {
  if (!tournamentId) return
  try {
    const { data, error } = await supabase
      .from('tournaments')
      .select('data, updated_at')
      .eq('id', tournamentId)
      .single()

    if (error) throw error
    if (!data) {
      document.querySelector('.content').innerHTML = '<div class="error-msg">イベントが見つかりません。<br>URLが正しいか確認してください。</div>'
      return
    }
    tournamentData = data.data
    tournamentData._updatedAt = data.updated_at
    render()
    updateStatus('live')
  } catch (e) {
    console.error('Fetch error:', e)
    updateStatus('error')
    if (!tournamentData) {
      document.querySelector('.content').innerHTML = '<div class="error-msg">データの取得に失敗しました。<br>しばらく待ってから更新してください。</div>'
    }
  }
}

// ── Realtime購読 ─────────────────────────
const subscribeRealtime = () => {
  if (!tournamentId) return
  supabase
    .channel('tournament-' + tournamentId)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'tournaments',
      filter: `id=eq.${tournamentId}`
    }, payload => {
      tournamentData = payload.new.data
      tournamentData._updatedAt = payload.new.updated_at
      render()
      updateStatus('live')
    })
    .subscribe()
}

// ── フォールバック: 30秒ポーリング ───────
let pollTimer = null
const startPolling = () => {
  pollTimer = setInterval(fetchData, 30000)
}

// ── ステータス表示 ───────────────────────
const updateStatus = (state) => {
  const el = document.getElementById('header-status')
  if (state === 'live') {
    const t = tournamentData?._updatedAt
    const timeStr = t ? new Date(t).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) : ''
    el.textContent = `自動更新中 ${timeStr}`
    el.className = 'header-status live'
  } else if (state === 'error') {
    el.textContent = '接続エラー'
    el.className = 'header-status'
    el.style.color = 'var(--danger)'
  } else {
    el.textContent = '接続中...'
    el.className = 'header-status'
  }
}

// ── ラウンドタイマー ─────────────────────────
let _viewTimerInterval = null
const _updateViewTimer = () => {
  const el = document.getElementById('view-timer')
  if (!el || !tournamentData) return
  const s = tournamentData.settings || {}
  if (!s.enableTimer || !s.timerEndAt) { el.style.display = 'none'; return }
  const remaining = Math.max(0, s.timerEndAt - Date.now())
  const min = Math.floor(remaining / 60000)
  const sec = Math.floor((remaining % 60000) / 1000)
  el.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`
  el.style.display = ''
  if (remaining <= 0) { el.style.color = 'var(--danger)' }
  else if (remaining < 60000) { el.style.color = 'var(--danger)' }
  else if (remaining < 300000) { el.style.color = 'var(--warning)' }
  else { el.style.color = 'var(--success)' }
  if (!_viewTimerInterval) {
    _viewTimerInterval = setInterval(_updateViewTimer, 1000)
  }
}

// ── 描画 ─────────────────────────────────
const render = () => {
  if (!tournamentData) return
  // イベント名をヘッダーに反映
  const tName = tournamentData.settings?.tournamentName
  document.getElementById('header-title').textContent = tName || 'イベント情報'
  document.title = tName || 'イベント情報'
  // タイマー表示
  _updateViewTimer()
  // 順位表タブの表示/非表示（点数記録ONの場合のみ表示）
  const vpEnabled = !!tournamentData.settings?.enableVP
  const standingsTab = document.querySelector('.tab[data-tab="standings"]')
  if (standingsTab) standingsTab.style.display = vpEnabled ? '' : 'none'
  // 順位表タブが非表示で選択中なら、テーブルタブに切り替え
  if (!vpEnabled && standingsTab?.classList.contains('active')) {
    standingsTab.classList.remove('active')
    standingsTab.setAttribute('aria-selected', 'false')
    document.getElementById('panel-standings').classList.remove('active')
    const tablesTab = document.querySelector('.tab[data-tab="tables"]')
    tablesTab?.classList.add('active')
    tablesTab?.setAttribute('aria-selected', 'true')
    document.getElementById('panel-tables').classList.add('active')
  }
  // 座席バナー
  renderSeatBanner()
  renderTables()
  if (vpEnabled) renderStandings()
  renderHistory()
}

const renderSeatBanner = () => {
  const banner = document.getElementById('seat-banner')
  const query = searchName.trim().toLowerCase()
  if (!query || !tournamentData) { banner.classList.remove('show'); return }
  const { players = [], tables = [] } = tournamentData
  // 完全一致を優先。部分一致は1人だけの場合のみ表示
  let player = players.find(p => p.name.toLowerCase() === query)
  if (!player) {
    const partial = players.filter(p => p.name.toLowerCase().includes(query))
    player = partial.length === 1 ? partial[0] : null
  }
  if (!player) { banner.classList.remove('show'); return }
  document.getElementById('seat-banner-name').textContent = player.name
  const table = tables.find(t => (t.playerIds || []).includes(player.id))
  const opEl = document.getElementById('seat-banner-opponents')
  if (table) {
    document.getElementById('seat-banner-table').textContent = table.label
    document.getElementById('seat-banner-status').textContent = table.status === 'playing' ? '対戦中' : ''
    const opponents = (table.playerIds || [])
      .filter(id => id !== player.id)
      .map(id => players.find(p => p.id === id)?.name ?? '?')
    opEl.textContent = opponents.length ? '対戦相手: ' + opponents.join(', ') : ''
    banner.classList.add('show')
  } else {
    const status = player.status === 'waiting' ? '待機中 — 次のマッチングをお待ちください' : player.status === 'excluded' ? '除外中' : ''
    document.getElementById('seat-banner-table').textContent = status || '未配席'
    document.getElementById('seat-banner-status').textContent = ''
    opEl.textContent = ''
    banner.classList.add('show')
  }
  // チェックイン表示
  const checkinBtn = document.getElementById('seat-checkin-btn')
  const checkinDone = document.getElementById('seat-checkin-done')
  const checkinEnabled = !!tournamentData.settings?.enableCheckin
  const checkedIn = localStorage.getItem('view_checkin_' + player.id)
  if (checkinBtn && checkinDone) {
    if (checkinEnabled && !checkedIn) {
      checkinBtn.style.display = ''
      checkinDone.style.display = 'none'
    } else if (checkinEnabled && checkedIn) {
      checkinBtn.style.display = 'none'
      checkinDone.style.display = ''
    } else {
      checkinBtn.style.display = 'none'
      checkinDone.style.display = 'none'
    }
  }
}

// ── テーブル一覧 ─────────────────────────
const renderTables = () => {
  const panel = document.getElementById('panel-tables')
  const { players = [], tables = [], settings = {} } = tournamentData
  const bracketOn = !!settings.enableBracket
  const selfScoreEnabled = !!settings.enableSelfScore && !!settings.enableVP
  const query = searchName.trim().toLowerCase()
  // セルフスコア用: 現在の検索対象プレイヤー
  let selfPlayer = null
  if (selfScoreEnabled && query) {
    selfPlayer = players.find(p => p.name.toLowerCase() === query) ||
      (players.filter(p => p.name.toLowerCase().includes(query)).length === 1 ? players.find(p => p.name.toLowerCase().includes(query)) : null)
  }

  if (!tables.length) {
    panel.innerHTML = '<div class="empty-msg">テーブルがまだ登録されていません</div>'
    return
  }

  // 対戦中テーブルを先に表示
  const sorted = [...tables].sort((a, b) => {
    if (a.status === 'playing' && b.status !== 'playing') return -1
    if (a.status !== 'playing' && b.status === 'playing') return 1
    return 0
  })

  let html = ''
  sorted.forEach(t => {
    const isPlaying = t.status === 'playing'
    const seated = (t.playerIds || []).map(id => players.find(p => p.id === id)).filter(Boolean)

    const statusHtml = isPlaying
      ? '<span class="card-status playing">対戦中</span>'
      : '<span class="card-status empty">空き</span>'

    let playersHtml = ''
    if (seated.length) {
      playersHtml = seated.map(p => {
        const isMatch = query && p.name.toLowerCase().includes(query)
        const brk = bracketOn && p.bracket ? `<span class="bracket-badge">${esc(p.bracket)}</span>` : ''
        const grp = p.group ? `<span class="group-badge">${esc(p.group)}</span>` : ''
        return `<div class="card-player${isMatch ? ' highlight' : ''}">
          <span class="card-player-name">${esc(p.name)}</span>${brk}${grp}
        </div>`
      }).join('')
    } else {
      playersHtml = Array.from({ length: t.size }, (_, i) =>
        `<div class="card-player empty-slot">- 空席 ${i + 1}</div>`
      ).join('')
    }

    html += `
    <div class="table-card${isPlaying ? ' playing' : ' empty'}">
      <div class="card-header">
        <span class="card-label">${esc(t.label)}</span>
        <span class="card-size">${t.size}人</span>
        ${statusHtml}
      </div>
      <div class="card-players">${playersHtml}</div>
      ${isPlaying && selfPlayer && seated.some(p => p.id === selfPlayer.id) ? (() => {
        const matchData = (tournamentData.matches || []).slice().reverse().find(m => m.tableId === t.id)
        if (!matchData) return ''
        const reports = matchData.finishedReports || []
        const alreadyReported = reports.includes(selfPlayer.id)
        const reportCount = reports.length
        const savedScore = localStorage.getItem('view_score_' + matchData.id + '_' + selfPlayer.id)

        let scoreHtml = ''
        if (selfScoreEnabled) {
          scoreHtml = `<div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:var(--text-dim);">自分のスコア:</span>
            <input type="number" class="self-score-input" data-match-id="${esc(matchData.id)}" data-pid="${esc(selfPlayer.id)}"
              value="${savedScore ?? ''}" inputmode="numeric" min="-999" max="9999"
              style="width:64px;font-size:16px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--warning);font-weight:700;text-align:center;">
            <span style="font-size:11px;color:var(--text-dim);">pt</span>
          </div>`
        }

        const finishHtml = alreadyReported
          ? `<div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:13px;color:var(--success);font-weight:600;">終了報告済み</span>
              <span style="font-size:11px;color:var(--text-dim);">(${reportCount}人が報告)</span>
            </div>`
          : `<button class="report-finish-btn" data-match-id="${esc(matchData.id)}" data-pid="${esc(selfPlayer.id)}"
              style="padding:10px 16px;min-height:44px;font-size:14px;font-weight:700;background:var(--accent2);color:white;border:none;border-radius:8px;cursor:pointer;">
              対戦終了を報告
            </button>`

        return `<div style="padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;">
          ${scoreHtml}${finishHtml}
        </div>`
      })() : ''}
    </div>`
  })
  panel.innerHTML = html

  // 対戦終了報告ボタン
  panel.querySelectorAll('.report-finish-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.disabled = true
      btn.textContent = '送信中...'
      try {
        const { data, error } = await supabase.rpc('report_finished', {
          p_tournament_id: tournamentId,
          p_match_id: btn.dataset.matchId,
          p_player_id: btn.dataset.pid,
        })
        if (error) { toast('送信に失敗しました'); btn.disabled = false; btn.textContent = '対戦終了を報告'; return }
        toast(`終了を報告しました（${data.reported}/${data.total}人）`)
        // リフレッシュして表示更新
        await fetchData()
      } catch (e) { toast('送信に失敗しました'); btn.disabled = false; btn.textContent = '対戦終了を報告' }
    })
  })

  // セルフスコア入力 → RPC経由でサーバーに送信
  if (selfScoreEnabled) {
    let _scoreTimer = null
    panel.querySelectorAll('.self-score-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const val = inp.value.trim()
        const matchId = inp.dataset.matchId
        const pid = inp.dataset.pid
        if (!matchId || !pid) return
        localStorage.setItem('view_score_' + matchId + '_' + pid, val)
        // デバウンスしてRPC呼び出し
        clearTimeout(_scoreTimer)
        _scoreTimer = setTimeout(async () => {
          const num = parseFloat(val)
          if (val === '' || isNaN(num) || !isFinite(num) || num < -999 || num > 9999) return
          try {
            const { error } = await supabase.rpc('submit_score', {
              p_tournament_id: tournamentId,
              p_match_id: matchId,
              p_player_id: pid,
              p_score: num,
            })
            if (error) { console.error('Score submit error:', error) }
            else { toast('スコアを送信しました') }
          } catch (e) { console.error('Score submit error:', e) }
        }, 800)
      })
    })
  }
}

// ── 順位表 ──────────────────────────────
const renderStandings = () => {
  const panel = document.getElementById('panel-standings')
  const { players = [], matches = [], settings = {} } = tournamentData
  const query = searchName.trim().toLowerCase()

  // VP集計
  const scoreMap = {}
  matches.forEach(m => {
    if (!m.scores) return
    Object.entries(m.scores).forEach(([pid, vp]) => {
      scoreMap[pid] = (scoreMap[pid] ?? 0) + (vp ?? 0)
    })
  })

  // 対戦回数集計
  const matchCount = {}
  matches.forEach(m => {
    m.playerIds.forEach(pid => { matchCount[pid] = (matchCount[pid] ?? 0) + 1 })
  })

  const hasScores = Object.keys(scoreMap).length > 0

  const rows = players
    .filter(p => !['excluded','break','left'].includes(p.status))
    .map(p => ({
      id: p.id,
      name: p.name,
      group: p.group,
      score: scoreMap[p.id] ?? 0,
      games: matchCount[p.id] ?? 0,
    }))
    .sort((a, b) => b.score - a.score || b.games - a.games)

  if (!rows.length) {
    panel.innerHTML = '<div class="empty-msg">プレイヤーがまだ登録されていません</div>'
    return
  }

  const headerScore = hasScores ? '<th style="text-align:right;">点数</th>' : ''
  const tableRows = rows.map((r, i) => {
    const isMatch = query && r.name.toLowerCase().includes(query)
    const grp = r.group ? ` <span class="group-badge">${esc(r.group)}</span>` : ''
    const score = hasScores ? `<td>${r.score}pt</td>` : ''
    return `<tr class="${isMatch ? 'highlight' : ''}">
      <td>${i + 1}</td>
      <td>${esc(r.name)}${grp}</td>
      ${score}
    </tr>`
  }).join('')

  panel.innerHTML = `
    <table class="standings-table">
      <thead><tr><th>#</th><th>名前</th>${headerScore}</tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`
  // ハイライト行に自動スクロール
  setTimeout(() => {
    const hl = panel.querySelector('tr.highlight')
    if (hl) hl.scrollIntoView({ behavior: 'smooth', block: 'center' })
  }, 100)
}

// ── 対戦履歴 ─────────────────────────────
const renderHistory = () => {
  const panel = document.getElementById('panel-history')
  const { players = [], matches = [], tables = [] } = tournamentData
  const query = searchName.trim().toLowerCase()

  // 検索名に一致するプレイヤーを自動選択
  let targetPlayer = null
  if (query) {
    targetPlayer = players.find(p => p.name.toLowerCase().includes(query))
  }

  // プレイヤー選択ドロップダウン（50音順）
  const sortedPlayers = [...players].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ja'))
  const options = sortedPlayers.map(p =>
    `<option value="${p.id}"${targetPlayer?.id === p.id ? ' selected' : ''}>${esc(p.name)}</option>`
  ).join('')

  let historyHtml = '<select class="history-player-select" id="history-select"><option value="">プレイヤーを選択...</option>' + options + '</select>'

  const selectedId = targetPlayer?.id || ''
  if (selectedId) {
    const myMatches = matches.filter(m => m.playerIds.includes(selectedId))

    // 対戦相手集計
    const countMap = {}
    myMatches.forEach(m => {
      m.playerIds.forEach(pid => {
        if (pid === selectedId) return
        countMap[pid] = (countMap[pid] ?? 0) + 1
      })
    })

    const opponentRows = Object.entries(countMap)
      .sort((a, b) => b[1] - a[1])
      .map(([pid, cnt]) => {
        const op = players.find(x => x.id === pid)
        const name = op ? esc(op.name) : '<span style="color:var(--text-dim)">(退出済み)</span>'
        const grp = op?.group ? `<span class="group-badge">${esc(op.group)}</span>` : ''
        return `<div class="history-item"><span class="history-name">${name}${grp}</span><span class="history-count">${cnt}回</span></div>`
      }).join('')

    // 対戦ごと詳細
    const matchDetail = myMatches.slice().reverse().map(m => {
      const tbl = tables.find(t => t.id === m.tableId)
      const opponents = m.playerIds
        .filter(pid => pid !== selectedId)
        .map(pid => players.find(x => x.id === pid)?.name ?? '?')
        .join(', ')
      const vp = m.scores?.[selectedId]
      const vpStr = vp != null ? `<span class="score-badge">${vp}pt</span>` : ''
      return `<div class="history-match">
        <span class="history-match-table">${esc(tbl?.label ?? '?')}</span>
        <span class="history-match-players">${esc(opponents)}</span>
        ${vpStr}
      </div>`
    }).join('')

    historyHtml += `
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">
        対戦回数：${myMatches.length}回 ／ 対戦相手：${Object.keys(countMap).length}人
      </p>`

    if (matchDetail) {
      historyHtml += `<div class="history-section-title">対戦ごとの詳細</div>${matchDetail}`
    }
    if (opponentRows) {
      historyHtml += `<div class="history-section-title">対戦相手</div>${opponentRows}`
    }

    if (!myMatches.length) {
      historyHtml += '<div class="empty-msg" style="padding:20px 0;">まだ対戦履歴がありません</div>'
    }
  } else {
    historyHtml += '<div class="empty-msg" style="padding:20px 0;">プレイヤーを選択するか、<br>上の検索欄に名前を入力してください</div>'
  }

  panel.innerHTML = historyHtml

  // ドロップダウン変更イベント
  document.getElementById('history-select')?.addEventListener('change', e => {
    const pid = e.target.value
    if (pid) {
      const p = players.find(x => x.id === pid)
      if (p) {
        searchName = p.name
        document.getElementById('search-input').value = p.name
        localStorage.setItem('view_search_name', searchName)
        render()
      }
    }
  })
}

// ── タブ切替 ─────────────────────────────
// ── チェックイン ─────────────────────────────
document.getElementById('seat-checkin-btn').addEventListener('click', () => {
  if (!tournamentData) return
  const query = searchName.trim().toLowerCase()
  const { players = [] } = tournamentData
  const player = players.find(p => p.name.toLowerCase() === query) ||
    (players.filter(p => p.name.toLowerCase().includes(query)).length === 1 ? players.find(p => p.name.toLowerCase().includes(query)) : null)
  if (!player) return
  localStorage.setItem('view_checkin_' + player.id, Date.now().toString())
  toast(player.name + ' — 出席確認しました')
  renderSeatBanner()
})

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false') })
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
    tab.classList.add('active')
    tab.setAttribute('aria-selected', 'true')
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active')
  })
})

// ── 名前検索 ─────────────────────────────
const searchInput = document.getElementById('search-input')
const searchClear = document.getElementById('search-clear')
const suggestionsEl = document.getElementById('search-suggestions')
searchInput.value = searchName

const updateSuggestions = () => {
  const q = searchInput.value.trim().toLowerCase()
  if (!q || !tournamentData) { suggestionsEl.classList.remove('show'); return }
  const players = tournamentData.players || []
  const matches = players
    .filter(p => p.name.toLowerCase().includes(q))
    .slice(0, 8)
  if (!matches.length || (matches.length === 1 && matches[0].name.toLowerCase() === q)) {
    suggestionsEl.classList.remove('show'); return
  }
  suggestionsEl.innerHTML = matches.map(p => {
    const idx = p.name.toLowerCase().indexOf(q)
    const highlighted = esc(p.name.slice(0, idx)) + '<mark>' + esc(p.name.slice(idx, idx + q.length)) + '</mark>' + esc(p.name.slice(idx + q.length))
    return `<div class="search-suggestion" role="option" data-name="${esc(p.name)}">${highlighted}</div>`
  }).join('')
  suggestionsEl.classList.add('show')
}

const selectSuggestion = name => {
  searchName = name
  searchInput.value = name
  localStorage.setItem('view_search_name', searchName)
  searchClear.classList.toggle('show', !!searchName)
  suggestionsEl.classList.remove('show')
  render()
}

suggestionsEl.addEventListener('click', e => {
  const item = e.target.closest('.search-suggestion')
  if (item) selectSuggestion(item.dataset.name)
})

searchInput.addEventListener('input', () => {
  searchName = searchInput.value
  localStorage.setItem('view_search_name', searchName)
  searchClear.classList.toggle('show', !!searchName)
  updateSuggestions()
  render()
})

searchInput.addEventListener('focus', () => updateSuggestions())
searchInput.addEventListener('keydown', e => {
  if (!suggestionsEl.classList.contains('show')) return
  const items = suggestionsEl.querySelectorAll('.search-suggestion')
  const active = suggestionsEl.querySelector('.search-suggestion.active')
  let idx = [...items].indexOf(active)
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); items.forEach(el => el.classList.remove('active')); items[idx]?.classList.add('active') }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); items.forEach(el => el.classList.remove('active')); items[idx]?.classList.add('active') }
  else if (e.key === 'Enter' && active) { e.preventDefault(); selectSuggestion(active.dataset.name) }
})

document.addEventListener('click', e => {
  if (!e.target.closest('.search-bar')) suggestionsEl.classList.remove('show')
})

searchClear.addEventListener('click', () => {
  searchName = ''
  searchInput.value = ''
  localStorage.setItem('view_search_name', '')
  searchClear.classList.remove('show')
  suggestionsEl.classList.remove('show')
  render()
})

if (searchName) searchClear.classList.add('show')

// ── 手動更新 ─────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', async () => {
  const btn = document.getElementById('btn-refresh')
  btn.classList.add('spinning')
  await fetchData()
  toast('更新しました')
  setTimeout(() => btn.classList.remove('spinning'), 600)
})

// ── テーマ ──────────────────────────────
let viewTheme = localStorage.getItem('view_theme') || ''  // '' = 管理者設定に従う
const applyTheme = () => {
  const theme = viewTheme || tournamentData?.settings?.theme || 'dark'
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light')
    document.getElementById('theme-icon').innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>'
  } else {
    document.documentElement.removeAttribute('data-theme')
    document.getElementById('theme-icon').innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>'
  }
}
document.getElementById('btn-theme').addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light'
  viewTheme = isLight ? 'dark' : 'light'
  localStorage.setItem('view_theme', viewTheme)
  applyTheme()
})

// ── 初期化 ──────────────────────────────
if (tournamentId) {
  // ローディング表示
  document.getElementById('panel-tables').innerHTML = '<div class="loading"><div class="loading-spinner"></div>データを読み込み中...</div>'

  fetchData().then(() => {
    applyTheme()
  })
  subscribeRealtime()
  startPolling()
}
